id: log_sessionizer
entry_point: build_sessions
tags: [data_pipeline, time_series, aggregation, day2-hard]
day2_stressors: [interface_generalization, streaming_compatibility, backwards_compatibility]
prompt: |
  Implement build_sessions(events: list[dict], gap_seconds: int) -> list[dict].

  Each valid event has user_id and integer timestamp. Skip malformed events.
  Sort valid events by user_id then timestamp. For each user, start a new
  session when the gap from the previous event is greater than gap_seconds.
  Return sessions sorted by user_id then start:
  {"user_id": str, "start": int, "end": int, "count": int}
test_code: |
  from solution import build_sessions


  def test_build_sessions_groups_by_user_and_gap():
      events = [
          {"user_id": "b", "timestamp": 20},
          {"user_id": "a", "timestamp": 1},
          {"user_id": "a", "timestamp": 4},
          {"user_id": "a", "timestamp": 20},
          {"user_id": "bad", "timestamp": "x"},
      ]
      assert build_sessions(events, gap_seconds=5) == [
          {"user_id": "a", "start": 1, "end": 4, "count": 2},
          {"user_id": "a", "start": 20, "end": 20, "count": 1},
          {"user_id": "b", "start": 20, "end": 20, "count": 1},
      ]
day2_prompt: |
  Add a duration field to each returned session, computed as end - start.
day2_test_code: |
  from solution import build_sessions


  def test_sessions_include_duration():
      sessions = build_sessions(
          [{"user_id": "a", "timestamp": 1}, {"user_id": "a", "timestamp": 6}],
          gap_seconds=10,
      )
      assert sessions == [
          {"user_id": "a", "start": 1, "end": 6, "count": 2, "duration": 5},
      ]
human_reference: |
  def build_sessions(events: list[dict], gap_seconds: int) -> list[dict]:
      valid_events = sorted(_valid_events(events), key=lambda item: (item["user_id"], item["timestamp"]))
      sessions = []
      current = None
      for event in valid_events:
          if current is None or _starts_new_session(current, event, gap_seconds):
              if current is not None:
                  sessions.append(current)
              current = {
                  "user_id": event["user_id"],
                  "start": event["timestamp"],
                  "end": event["timestamp"],
                  "count": 1,
              }
          else:
              current["end"] = event["timestamp"]
              current["count"] += 1
      if current is not None:
          sessions.append(current)
      return sessions


  def _valid_events(events: list[dict]) -> list[dict]:
      return [
          event
          for event in events
          if event.get("user_id") and isinstance(event.get("timestamp"), int)
      ]


  def _starts_new_session(current: dict, event: dict, gap_seconds: int) -> bool:
      return current["user_id"] != event["user_id"] or event["timestamp"] - current["end"] > gap_seconds
