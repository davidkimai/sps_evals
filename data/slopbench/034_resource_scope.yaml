  from __future__ import annotations


  class ResourceScope:
      def __init__(self):
          self.resources = []

      def __enter__(self):
          return self

      def acquire(self, resource):
          self.resources.append(resource)
          return resource

      def __exit__(self, exc_type, exc, tb):
          for resource in reversed(self.resources):
              if hasattr(resource, 'close'):
                  resource.close()
          self.resources.clear()
          return False
mock_day2_solution: |
  from __future__ import annotations


  class ResourceScope:
      def __init__(self):
          self.resources = []

      def __enter__(self):
          return self

      def acquire(self, resource):
          self.resources.append(resource)
          return resource

      def release(self, resource):
          if resource not in self.resources:
              raise ValueError('resource is not tracked')
          self.resources.remove(resource)
          if hasattr(resource, 'close'):
              resource.close()

      def __exit__(self, exc_type, exc, tb):
          for resource in reversed(self.resources):
              if hasattr(resource, 'close'):
                  resource.close()
          self.resources.clear()
          return False
