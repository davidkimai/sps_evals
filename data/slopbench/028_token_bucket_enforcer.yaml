mock_day2_solution: |
  from __future__ import annotations

  import time


  class TokenBucketEnforcer:
      def __init__(self, capacity: int, refill_rate: float, *, burst: int = 0, now=None) -> None:
          if capacity <= 0 or refill_rate <= 0 or burst < 0:
              raise ValueError('invalid bucket parameters')
          self.capacity = capacity + burst
          self.refill_rate = refill_rate
          self.now = now or time.monotonic
          self.tokens = float(self.capacity)
          self.last = self.now()

      def allow(self, cost: int = 1) -> bool:
          if cost <= 0:
              raise ValueError('cost must be positive')
          current = self.now()
          self.tokens = min(self.capacity, self.tokens + max(0, current - self.last) * self.refill_rate)
          self.last = current
          if self.tokens < cost:
              return False
          self.tokens -= cost
          return True
