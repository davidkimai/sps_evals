mock_day2_solution: |
  from __future__ import annotations

  import threading

  _EMPTY = object()


  class LazySingleton:
      def __init__(self, factory):
          self.factory = factory
          self.value = _EMPTY
          self.lock = threading.Lock()

      def get(self):
          with self.lock:
              if self.value is _EMPTY:
                  self.value = self.factory()
              return self.value

      def reset_for_test(self):
          with self.lock:
              self.value = _EMPTY
