mock_day2_solution: |
  from __future__ import annotations

  import time


  class CircuitBreaker:
      def __init__(self, failure_threshold: int, recovery_timeout: float, *, now=None):
          if failure_threshold <= 0 or recovery_timeout <= 0:
              raise ValueError('invalid circuit breaker configuration')
          self.failure_threshold = failure_threshold
          self.recovery_timeout = recovery_timeout
          self.now = now or time.monotonic
          self.failures = 0
          self.opened_at = 0.0
          self.state = 'closed'

      def update_thresholds(self, failure_threshold=None, recovery_timeout=None):
          if failure_threshold is not None:
              if failure_threshold <= 0:
                  raise ValueError('failure_threshold must be positive')
              self.failure_threshold = failure_threshold
          if recovery_timeout is not None:
              if recovery_timeout <= 0:
                  raise ValueError('recovery_timeout must be positive')
              self.recovery_timeout = recovery_timeout

      def call(self, func):
          if self.state == 'open' and self.now() - self.opened_at < self.recovery_timeout:
              raise RuntimeError('circuit open')
          if self.state == 'open':
              self.state = 'half_open'
          try:
              value = func()
          except Exception:
              self.failures += 1
              if self.failures >= self.failure_threshold or self.state == 'half_open':
                  self.state = 'open'
                  self.opened_at = self.now()
              raise
          self.failures = 0
          self.state = 'closed'
          return value
