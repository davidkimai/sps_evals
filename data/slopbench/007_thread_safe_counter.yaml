mock_day2_solution: |
  from threading import Lock


  class BoundedCounter:
      def __init__(self, max_total: int):
          if max_total <= 0:
              raise ValueError("max_total must be positive")
          self._max_total = max_total
          self._counts = {}
          self._total = 0
          self._lock = Lock()

      def increment(self, name: str) -> int:
          with self._lock:
              if self._total >= self._max_total:
                  raise OverflowError("counter capacity exceeded")
              next_value = self._counts.get(name, 0) + 1
              self._counts[name] = next_value
              self._total += 1
              return next_value

      def decrement(self, name: str) -> int:
          with self._lock:
              current = self._counts.get(name, 0)
              if current <= 0:
                  raise KeyError(name)
              next_value = current - 1
              if next_value:
                  self._counts[name] = next_value
              else:
                  del self._counts[name]
              self._total -= 1
              return next_value

      def total(self) -> int:
          with self._lock:
              return self._total

      def snapshot(self) -> dict[str, int]:
          with self._lock:
              return dict(self._counts)
