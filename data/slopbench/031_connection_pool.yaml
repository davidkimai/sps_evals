id: connection_pool
entry_point: ConnectionPool
tags: [object_lifecycle, resource_management, day2-hard]
day2_stressors: [cross_function_state, parameter_threading, backwards_compatibility]
prompt: |
  Implement ConnectionPool(factory, *, max_size: int, now=None). acquire() returns
  an idle connection or creates one. release(conn) returns it to the idle pool if
  capacity permits. evict_idle(max_idle_seconds) closes and removes idle
  connections older than the threshold.
test_code: |
  from solution import ConnectionPool


  class Conn:
      def __init__(self):
          self.closed = False
      def close(self):
          self.closed = True


  def test_reuses_and_evicts_idle_connections():
      clock = {'t': 0.0}
      pool = ConnectionPool(Conn, max_size=1, now=lambda: clock['t'])
      conn = pool.acquire()
      pool.release(conn)
      assert pool.acquire() is conn
      pool.release(conn)
      clock['t'] = 10.0
      pool.evict_idle(5.0)
      assert conn.closed is True
day2_prompt: |
  Extend ConnectionPool with health_check: callable | None = None. When acquire()
  selects an idle connection and health_check returns False, close that connection
  and continue looking or create a new one. Preserve behavior when omitted.
day2_test_code: |
  from solution import ConnectionPool


  class Conn:
      def __init__(self, name):
          self.name = name
          self.closed = False
      def close(self):
          self.closed = True


  def test_health_check_discards_bad_idle_connection():
      made = []
      def factory():
          conn = Conn(str(len(made)))
          made.append(conn)
          return conn
      pool = ConnectionPool(factory, max_size=2, health_check=lambda conn: conn.name != '0')
      first = pool.acquire()
      pool.release(first)
      second = pool.acquire()
      assert first.closed is True
      assert second is not first
human_reference: |
  from __future__ import annotations

  import time
  from collections.abc import Callable
  from typing import Any


  class ConnectionPool:
      def __init__(self, factory: Callable[[], Any], *, max_size: int, now: Callable[[], float] | None = None) -> None:
          if max_size <= 0:
              raise ValueError('max_size must be positive')
          self._factory = factory
          self._max_size = max_size
          self._now = now or time.monotonic
          self._idle: list[tuple[Any, float]] = []

      def acquire(self):
          if self._idle:
              conn, _stamp = self._idle.pop()
              return conn
          return self._factory()

      def release(self, conn) -> None:
          if len(self._idle) < self._max_size:
              self._idle.append((conn, self._now()))
          elif hasattr(conn, 'close'):
              conn.close()

      def evict_idle(self, max_idle_seconds: float) -> None:
          kept = []
          current = self._now()
          for conn, stamp in self._idle:
              if current - stamp > max_idle_seconds:
                  if hasattr(conn, 'close'):
                      conn.close()
              else:
                  kept.append((conn, stamp))
          self._idle = kept
